  <title>Bomba - منصة إدارة ذكية للكافيهات والمطاعم والترفيه</title>
  
  <!-- Apply language direction IMMEDIATELY before any rendering -->
  <script>
    (function() {
      // Get saved language from localStorage (default to Arabic)
      var savedLanguage = localStorage.getItem('language') || 'ar';
      
      // List of RTL languages (from shared/languages.js)
      // ar, he, fa, ur, ps, yi, sd, ug, dv, ku
      var rtlLanguages = ['ar', 'he', 'fa', 'ur', 'ps', 'yi', 'sd', 'ug', 'dv', 'ku'];
      var isRTL = rtlLanguages.indexOf(savedLanguage) !== -1;
      
      // Apply direction to html element immediately
      document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
      document.documentElement.lang = savedLanguage;
      
      // Apply direction to body when it's available
      if (document.body) {
        var token = localStorage.getItem('token');
        var isAuthPage = /^\/(login|register|verify-email|reset-password|email-actions)/.test(window.location.pathname);
        document.body.dir = (token && !isAuthPage) ? (isRTL ? 'rtl' : 'ltr') : 'ltr';
      }
    })();
  </script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap');

    * {
      font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }
  </style>
</head>
